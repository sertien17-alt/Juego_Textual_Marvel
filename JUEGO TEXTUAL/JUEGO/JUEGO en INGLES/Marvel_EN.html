<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARVEL: The Last Hero</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{--red:#e23636;--gold:#f0c040;--blue:#1a6fb5;--darker:#060608;--text:#c8d8e8;--dim:#556677;--green:#69ff47;--orange:#ff9f43;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--darker);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(226,54,54,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(26,111,181,.05) 0%,transparent 50%);}
#gc{width:100%;max-width:900px;border:1px solid var(--red);box-shadow:0 0 40px rgba(226,54,54,.25),inset 0 0 40px rgba(0,0,0,.6);background:rgba(10,10,15,.97);}
#hdr{background:var(--red);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
#hdr .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:4px;text-shadow:2px 2px 0 #8b0000;}
#hdr .sub{font-size:.68rem;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase;}
#sb{display:flex;gap:20px;padding:7px 20px;background:rgba(226,54,54,.08);border-bottom:1px solid rgba(226,54,54,.25);font-size:.73rem;flex-wrap:wrap;}
.st{color:var(--dim)}.st span{color:var(--gold);font-weight:700}.st.hp span{color:#4caf50}
#main{display:flex;height:500px;}
#out{flex:1;padding:18px;overflow-y:auto;border-right:1px solid rgba(226,54,54,.15);display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:var(--red) transparent;}
#out::-webkit-scrollbar{width:3px}#out::-webkit-scrollbar-thumb{background:var(--red)}
.m{font-size:.83rem;line-height:1.65;}
.m.sys{color:var(--gold)}.m.err{color:#ff6b6b;font-style:italic}.m.ok{color:var(--green)}.m.fight{color:var(--orange)}.m.desc{color:var(--text)}.m.echo{color:var(--dim)}.m.ascii{color:var(--red);white-space:pre;font-size:.58rem;line-height:1.15;}.m.ttl{color:var(--gold);font-family:'Orbitron',sans-serif;font-size:.88rem;border-bottom:1px solid rgba(240,192,64,.25);padding-bottom:3px;margin-bottom:3px;}.m.sep{color:rgba(226,54,54,.3);}
#side{width:210px;padding:14px;font-size:.73rem;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:rgba(6,6,12,.6);}
.sl{color:var(--red);font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:2px;border-bottom:1px solid rgba(226,54,54,.25);padding-bottom:3px;margin-bottom:5px;}
.ii{color:var(--text);padding:2px 0;display:flex;align-items:center;gap:5px;font-size:.7rem;}
.ii::before{content:'▸';color:var(--red);font-size:.58rem;}.ii.weapon::before{content:'⚔';}.ii.armor::before{content:'🛡';}.ii.potion::before{content:'⚗';}.ii.key::before{content:'★';color:var(--gold);}
.ln{color:var(--blue);font-size:.77rem;font-weight:700;}.lz{color:var(--dim);font-size:.67rem;}.le{color:var(--dim);font-size:.65rem;margin-top:3px;}.le span{color:#aaa;}
#ia{padding:11px 20px;border-top:1px solid rgba(226,54,54,.25);display:flex;align-items:center;gap:10px;}
.pr{color:var(--red);font-size:.9rem;}
#ci{flex:1;background:transparent;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.84rem;outline:none;caret-color:var(--red);}
#ci::placeholder{color:var(--dim);}
#hb{padding:5px 20px;background:rgba(0,0,0,.4);font-size:.62rem;color:var(--dim);display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid zmrgba(255,255,255,.04);}
#hb b{color:var(--red);}#hb span{color:#666;}
</style>
</head>
<body>
<div id="gc">
  <div id="hdr">
    <div><div class="logo">MARVEL</div><div class="sub">The Last Hero — Text Adventure</div></div>
    <div style="text-align:right;font-size:.65rem;color:rgba(255,255,255,.5);">HTML5 · ENGLISH · v2.0</div>
  </div>
  <div id="sb">
    <div class="st hp">HP: <span id="s-hp">100/100</span></div>
    <div class="st">CHARACTER: <span>Nick Fury</span></div>
    <div class="st">RANK: <span>S.H.I.E.L.D. Director</span></div>
    <div class="st">STATUS: <span id="s-phase">Active</span></div>
  </div>
  <div id="main">
    <div id="out"></div>
    <div id="side">
      <div>
        <div class="sl">▶ LOCATION</div>
        <div class="ln" id="s-loc">—</div>
        <div class="lz" id="s-zone">—</div>
        <div class="le" id="s-exits">Exits: <span>—</span></div>
      </div>
      <div>
        <div class="sl">▶ INVENTORY</div>
        <div id="s-inv"></div>
      </div>
      <div>
        <div class="sl">▶ OBJECTIVES</div>
        <div id="s-obj" style="font-size:.66rem;color:#777;line-height:1.7;white-space:pre;"></div>
      </div>
    </div>
  </div>
  <div id="ia">
    <span class="pr">FURY&gt;</span>
    <input id="ci" type="text" placeholder="type a command..." autocomplete="off" autofocus>
  </div>
  <div id="hb">
    <div><b>go</b> <span>[north/south/east/west]</span></div>
    <div><b>look</b></div><div><b>explore</b></div>
    <div><b>take</b> <span>[item]</span></div>
    <div><b>use</b> <span>[item]</span></div>
    <div><b>attack</b></div><div><b>inventory</b></div><div><b>help</b></div>
  </div>
</div>
<script>
// ── Random unknown responses ───────────────────────────────────────────────
const RAND = [
  "FRIDAY doesn't understand that. Maybe you should call Doctor Strange.",
  "Tony Stark would say: 'Great, I built an AI and it doesn't understand English.' Try again.",
  "ERROR 616: Unknown command. Charles Xavier has been notified... but he already knew.",
  "HULK SMASH KEYBOARD? Because that command makes absolutely no sense.",
  "Loki says: 'I don't know what you mean, but it sounds like a great plan to cause chaos.'",
  "Wanda rewrote reality and now she doesn't understand what you want either.",
  "S.H.I.E.L.D. logs unknown command. File sent to Nick Fury... which is you. Figure it out.",
  "Peter Parker would say 'With great power comes great responsibility'... you currently have 0 of both.",
  "Thor says: 'I am no expert in your mortal words, but even ODIN would not understand that!'",
];

// ── ASCII Art ─────────────────────────────────────────────────────────────
const ASCII = {
  avengers:`
   ▄████████▄
  ████▀▀▀▀████
  ████  A  ████
  ████     ████
  ▀████▄▄████▀
    ▀▀████▀▀
  AVENGERS TOWER`,
  shield:`
  ╔═══════════╗
  ║ S.H.I.E.L.D ║
  ║   ◉─────◉  ║
  ║   │  ▲  │  ║
  ║   │ ═╪═ │  ║
  ║   ◉─────◉  ║
  ╚═══════════╝`,
  wakanda:`
    /\\  /\\  /\\
   /WW\\/ K\\/ A\\
  /  WAKANDA  \\
  \\___________/
   ║ VIBRANIUM ║
   ╚═══╦════╝
       ║`,
  stark:`
   ┌─────────────┐
   │  ♥  ARC    │
   │  REACTOR   │
   │    ◎◎◎     │
   │   ◎ ◎ ◎   │
   │    ◎◎◎     │
   └─────────────┘`,
  thanos:`
    ║▌║▌║║╠╬╬
   ╔╩╦╩╦╩╦╩╗
   ║T H A N O S║
   ╠══◈══◈══╣
   ║  ∞∞∞∞  ║
   ╚════════╝
  THE MAD TITAN`,
  strange:`
  ╔══════════════╗
  ║  SANCTA      ║
  ║  SANCTORUM   ║
  ║   ◎  ⊗  ◎   ║
  ║  EYE AGAMOTTO║
  ╚══════════════╝`,
};

// ── World ─────────────────────────────────────────────────────────────────
const WORLD = {
  tower: {
    name:"Avengers Tower", main_zone:"lobby",
    loc_exits:{ south:"shield" },
    zones:{
      lobby:{ name:"Main Lobby", ascii:"avengers",
        desc:"The majestic lobby of Avengers Tower. Holographic screens display the latest global threats. The receptionist is a STARK robot.",
        exits:{ north:"meeting_room", east:"lab" }, items:[] },
      meeting_room:{ name:"Avengers Meeting Room",
        desc:"An enormous circular table with seats for every Avenger. You spot notes from past missions and the Captain's tracker device on the table.",
        exits:{ south:"lobby", east:"lab" }, items:["tracker"] },
      lab:{ name:"Tony Stark's Laboratory", ascii:"stark",
        desc:"Dozens of Iron Man armor pieces cover the walls. FRIDAY watches you. The air smells of machine oil and caffeine.",
        exits:{ west:"meeting_room", south:"lobby" }, items:["armor"] },
    }
  },
  shield:{ name:"S.H.I.E.L.D. HQ", main_zone:"entrance",
    loc_exits:{ north:"tower", south:"wakanda", east:"sancta" },
    zones:{
      entrance:{ name:"Security Entrance", ascii:"shield",
        desc:"Biometric scanners everywhere. Agents in sunglasses watch you with suspicion. Even you, Nick Fury.",
        exits:{ north:"control", east:"armory" }, items:[] },
      control:{ name:"Control Room",
        desc:"Multiple screens show threats in real time. Coulson manages the chaos with a cup of coffee and a stoic smile.",
        exits:{ south:"entrance", east:"armory" }, items:["intel"] },
      armory:{ name:"Classified Armory",
        desc:"Experimental weapons everywhere. You spot the S.H.I.E.L.D. PLASMA RIFLE and a bottle labeled 'Healing Potion — Dr. Strange'.",
        exits:{ south:"control", west:"entrance" }, items:["rifle","potion"] },
    }
  },
  wakanda:{ name:"Wakanda", main_zone:"plains",
    loc_exits:{ north:"shield", east:"sancta" },
    zones:{
      plains:{ name:"Wakandan Plains", ascii:"wakanda",
        desc:"Lush vegetation surrounds the hidden nation. Vibranium rhinoceroses graze in the distance. T'Challa watches you from the shadows.",
        exits:{ north:"throne", east:"mines" }, items:[] },
      throne:{ name:"Throne Room",
        desc:"King T'Challa receives you formally. The walls are decorated with the Black Panther's historic victories.",
        exits:{ south:"plains", east:"mines" }, items:["claw"] },
      mines:{ name:"Vibranium Mines",
        desc:"Glowing purple metal fills the walls. You feel the constant hum of vibranium energy resonating in your chest.",
        exits:{ west:"throne", north:"plains" }, items:["ingot"] },
    }
  },
  sancta:{ name:"Sancta Sanctorum", main_zone:"street",
    loc_exits:{ west:"shield", south:"wakanda", north:"battlefield" },
    zones:{
      street:{ name:"Bleecker Street", ascii:"strange",
        desc:"A Victorian building in NYC's Greenwich Village. A circular window bearing the Eye of Agamotto symbol glows mysteriously.",
        exits:{ north:"library", east:"portals" }, items:[] },
      library:{ name:"Magic Library",
        desc:"Thousands of magic books float in the air. Wong offers you tea and a look of simultaneous disapproval. It's a gift.",
        exits:{ south:"street", east:"portals" }, items:["spellbook"] },
      portals:{ name:"Portal Room",
        desc:"Doctor Strange meditates here. Portals to unknown dimensions open and close at random. You feel dizzy and awed in equal measure.",
        exits:{ west:"library", south:"street" }, items:["broken_gauntlet"] },
    }
  },
  battlefield:{ name:"Final Battlefield", main_zone:"gate",
    loc_exits:{ south:"sancta" },
    zones:{
      gate:{ name:"Gate of the Apocalypse", ascii:"thanos",
        desc:"The sky is purple and red. Giant craters mark the earth. The smell of ozone tells you powerful magic has been used here very recently.",
        exits:{ north:"center", east:"shelter" }, items:[] },
      center:{ name:"Center of the Battlefield", enemy:true,
        desc:"THANOS awaits you here. With the Infinity Gauntlet (partially repaired) on his fist. He watches you with complete cosmic indifference.",
        exits:{ south:"gate", east:"shelter" }, items:[] },
      shelter:{ name:"Survivors' Shelter",
        desc:"Remains of fallen heroes' armor surround this sacred place. A note from Thor reads: 'You should go get the shield, friend.'",
        exits:{ west:"center", south:"gate" }, items:["shield"] },
    }
  }
};

// ── Items ──────────────────────────────────────────────────────────────────
const ITEMS = {
  tracker:{ name:"Captain America's Tracker", type:"key",
    desc:"Device that can locate Cap's Shield. Key to the mission." },
  armor:{ name:"Iron Man Mark L Armor", type:"armor",
    desc:"Tony Stark's nano-tech protection. +40 max HP when equipped." },
  intel:{ name:"Thanos Intelligence", type:"key",
    desc:"S.H.I.E.L.D. classified information about the Mad Titan's weaknesses." },
  rifle:{ name:"S.H.I.E.L.D. Plasma Rifle", type:"weapon",
    desc:"Powerful long-range weapon. Damage: 35. Very effective against armored targets." },
  potion:{ name:"Healing Potion (Doctor Strange)", type:"potion",
    desc:"Restores 50 HP. Prepared by Wong at Kamar-Taj with ingredients from other dimensions." },
  claw:{ name:"Vibranium Claw (T'Challa)", type:"weapon",
    desc:"The Black Panther's claws. Damage: 25. Forged in pure Wakandan vibranium." },
  ingot:{ name:"Vibranium Ingot", type:"key",
    desc:"Precious metal from Wakanda. The most resistant material known on Earth." },
  spellbook:{ name:"Doctor Strange's Spell Book", type:"key",
    desc:"Contains the Crimson Bands of Cyttorak spell. Physically immobilizes enemies." },
  broken_gauntlet:{ name:"Broken Infinity Gauntlet", type:"key",
    desc:"Damaged version of the Gauntlet. Unusable, but it tells the story of Thanos." },
  shield:{ name:"Captain America's Shield", type:"weapon", key_item:true,
    desc:"The LEGENDARY weapon made of pure vibranium. Damage: 60. REQUIRED to defeat Thanos." },
};

// ── Game State ─────────────────────────────────────────────────────────────
const G = {
  loc:"shield", zone:"entrance",
  inv:["claw"],
  hp:100, maxHp:100,
  dead:false, won:false,
  floor:{},
};

Object.entries(WORLD).forEach(([lid,l])=>
  Object.entries(l.zones).forEach(([zid,z])=>{
    G.floor[`${lid}_${zid}`]=[...(z.items||[])];
  })
);

// ── UI Helpers ─────────────────────────────────────────────────────────────
const outEl = document.getElementById("out");
function pr(txt, cls="desc"){
  const d=document.createElement("div");
  d.className=`m ${cls}`; d.innerHTML=txt;
  outEl.appendChild(d); outEl.scrollTop=outEl.scrollHeight;
}
function sep(){ pr("─".repeat(52),"sep"); }
function title(t){ pr(t,"ttl"); }

function updatePanel(){
  const l=WORLD[G.loc], z=l.zones[G.zone];
  document.getElementById("s-loc").textContent=l.name;
  document.getElementById("s-zone").textContent=`↳ ${z.name}`;
  document.getElementById("s-hp").textContent=`${G.hp}/${G.maxHp}`;
  document.getElementById("s-phase").textContent=G.won?"VICTORY!":G.dead?"GAME OVER":"Active";

  const ex={...z.exits};
  if(G.zone===l.main_zone && l.loc_exits) Object.assign(ex, l.loc_exits);
  document.getElementById("s-exits").innerHTML=
    `Exits: <span>${Object.keys(ex).join(", ")||"none"}</span>`;

  const invEl=document.getElementById("s-inv");
  invEl.innerHTML="";
  if(!G.inv.length){
    invEl.innerHTML='<div style="color:var(--dim);font-size:.68rem;">(empty)</div>';
  } else {
    G.inv.forEach(id=>{
      const it=ITEMS[id];
      const d=document.createElement("div");
      d.className=`ii ${it.type}`; d.textContent=it.name; invEl.appendChild(d);
    });
  }

  const o1=G.inv.includes("shield")?"☑ Shield acquired":"☐ Find Cap's Shield";
  const o2=G.dead?"✗ Defeated":G.won?"☑ Thanos defeated":"☐ Defeat Thanos";
  document.getElementById("s-obj").textContent=`${o1}\n${o2}`;
}

// ── Describe current zone ──────────────────────────────────────────────────
function describe(){
  const l=WORLD[G.loc], z=l.zones[G.zone];
  sep();
  title(`📍 ${l.name} — ${z.name}`);
  pr(z.desc);
  if(z.ascii && ASCII[z.ascii]) pr(ASCII[z.ascii],"ascii");
  const k=`${G.loc}_${G.zone}`;
  const fl=G.floor[k]||[];
  if(fl.length) pr(`You see here: <span style="color:var(--gold)">${fl.map(i=>ITEMS[i].name).join(", ")}</span>`);
  if(z.enemy && !G.won) pr(`<span style="color:#ff4444">⚠ THANOS BLOCKS YOUR PATH. You need Cap's Shield to defeat him!</span>`,"fight");
  const ex={...z.exits};
  if(G.zone===l.main_zone && l.loc_exits) Object.assign(ex,l.loc_exits);
  const xs=Object.keys(ex).map(d=>`<span style="color:var(--gold)">${d}</span>`).join(", ");
  pr(`Exits: ${xs||"<span style='color:var(--dim)'>none</span>"}`);
}

// ── Commands ───────────────────────────────────────────────────────────────
function cmdGo(dir){
  if(!dir){ pr("Where do you want to go? Specify a direction.","err"); return; }
  const l=WORLD[G.loc], z=l.zones[G.zone];
  if(z.exits[dir]){ G.zone=z.exits[dir]; describe(); return; }
  if(G.zone===l.main_zone && l.loc_exits && l.loc_exits[dir]){
    const dest=l.loc_exits[dir];
    G.loc=dest; G.zone=WORLD[dest].main_zone;
    pr(`Traveling to <span style="color:var(--blue)">${WORLD[dest].name}</span>...`,"sys");
    describe(); return;
  }
  pr(`You can't go ${dir} from here. Not even Scarlet Witch could open a portal in that direction.`,"err");
}

function cmdTake(q){
  if(!q){ pr("What do you want to take?","err"); return; }
  const k=`${G.loc}_${G.zone}`;
  const fl=G.floor[k]||[];
  const id=fl.find(i=>ITEMS[i].name.toLowerCase().includes(q)||i.includes(q.replace(/ /g,"_")));
  if(!id){ pr(`You can't find "${q}" here. Try using <b>explore</b>.`,"err"); return; }
  G.floor[k]=fl.filter(i=>i!==id);
  G.inv.push(id);
  const it=ITEMS[id];
  if(it.type==="armor"){
    G.maxHp=Math.min(160,G.maxHp+40);
    G.hp=Math.min(G.maxHp,G.hp+40);
    pr(`You picked up: <span style="color:var(--gold)">${it.name}</span>. The armor protects you! +40 max HP.`,"ok");
  } else {
    pr(`You picked up: <span style="color:var(--gold)">${it.name}</span>. <span style="color:var(--dim)">${it.desc}</span>`,"ok");
  }
  if(id==="shield") pr(`⚡ <span style="color:var(--gold)">CAPTAIN AMERICA'S SHIELD! Now you can face Thanos!</span>`,"sys");
}

function cmdUse(q){
  if(!q){ pr("What item do you want to use?","err"); return; }
  const id=G.inv.find(i=>ITEMS[i].name.toLowerCase().includes(q)||i.includes(q));
  if(!id){ pr(`You don't have "${q}" in your inventory.`,"err"); return; }
  const it=ITEMS[id];
  if(it.type==="potion"){
    const h=50; G.hp=Math.min(G.maxHp,G.hp+h);
    G.inv=G.inv.filter(i=>i!==id);
    pr(`You drink the <span style="color:var(--gold)">${it.name}</span>. You recover ${h} HP! Current HP: ${G.hp}/${G.maxHp}`,"ok");
  } else if(it.type==="weapon"){
    pr(`You brandish <span style="color:var(--gold)">${it.name}</span> in the air. Impressive, but there's no enemy here.`);
  } else {
    pr(`You examine <span style="color:var(--gold)">${it.name}</span>: ${it.desc}`);
  }
}

function cmdExamine(q){
  if(!q){ pr("What do you want to examine?","err"); return; }
  const id=G.inv.find(i=>ITEMS[i].name.toLowerCase().includes(q)||i.includes(q));
  if(id) pr(`<span style="color:var(--gold)">${ITEMS[id].name}</span>: ${ITEMS[id].desc}`);
  else pr(`You don't have "${q}" in your inventory.`,"err");
}

function cmdExplore(){
  const k=`${G.loc}_${G.zone}`;
  const fl=G.floor[k]||[];
  const z=WORLD[G.loc].zones[G.zone];
  pr("You explore the area thoroughly...","sys");
  if(z.ascii && ASCII[z.ascii]) pr(ASCII[z.ascii],"ascii");
  if(fl.length) pr(`You find: <span style="color:var(--gold)">${fl.map(i=>ITEMS[i].name).join(", ")}</span>`,"ok");
  else pr("There is nothing else to pick up here.");
  if(z.enemy && !G.won) pr("THANOS watches you with the Gauntlet. His power is immeasurable.","fight");
}

function cmdInventory(){
  if(!G.inv.length){ pr("Your inventory is empty. You're Nick Fury, not Ant-Man.","sys"); return; }
  title("🎒 INVENTORY");
  G.inv.forEach(id=>{
    const it=ITEMS[id];
    const ic=it.type==="weapon"?"⚔":it.type==="armor"?"🛡":it.type==="potion"?"⚗":"★";
    pr(`${ic} <span style="color:var(--gold)">${it.name}</span> — ${it.desc}`);
  });
}

function cmdAttack(){
  const z=WORLD[G.loc].zones[G.zone];
  if(!z.enemy){ pr("There's no enemy here. Calm down, you're not the Punisher.","err"); return; }
  if(G.won){ pr("Thanos has already been defeated. The universe is safe.","sys"); return; }
  if(G.dead){ pr("You've been defeated. Reload the page to try again.","err"); return; }

  if(!G.inv.includes("shield")){
    pr("You try to attack Thanos but your blows do absolutely nothing!","fight");
    pr(`Thanos laughs: <em style="color:#ff4444">"Seriously? Without Cap's Shield? Go find it first."</em>`,"fight");
    const d=20; G.hp=Math.max(0,G.hp-d);
    pr(`Thanos hits you with the Gauntlet! You lose ${d} HP. HP remaining: <span style="color:#ff6666">${G.hp}/${G.maxHp}</span>`,"fight");
    if(G.hp<=0){
      sep();
      pr("You have been defeated by Thanos. The universe is doomed...","err");
      pr("Reload the page to try again.","err");
      G.dead=true;
    }
    return;
  }

  title("⚡ FINAL COMBAT: Nick Fury vs Thanos");
  pr("You throw <span style='color:var(--gold)'>CAPTAIN AMERICA'S SHIELD</span> with full force!","fight");
  pr("The vibranium shield shatters the partially repaired Infinity Gauntlet!","fight");
  if(G.inv.includes("spellbook")){
    pr(`You recall the spell from Strange's Book: <em>"Crimson Bands of Cyttorak!"</em>`,"fight");
    pr("The crimson bands fully immobilize Thanos!","fight");
  }
  if(G.inv.includes("rifle")){
    pr("You fire the S.H.I.E.L.D. Plasma Rifle while Thanos is immobilized!","fight");
  }
  pr("","desc");
  pr(`🎊 <span style="color:var(--green)">THANOS HAS BEEN DEFEATED! The Mad Titan falls to his knees.</span>`,"ok");
  pr(`Thanos: <em style="color:#aaa">"Respect... Perhaps the universe... did deserve to be saved..."</em>`);
  pr("The Infinity Gauntlet disintegrates into cosmic dust. Reality is safe!","ok");
  sep();
  pr("═".repeat(38),"sep");
  title("         ★  TOTAL VICTORY  ★         ");
  pr("     Nick Fury has saved the universe!    ","sys");
  pr("═".repeat(38),"sep");
  pr("You completed: <b>MARVEL: The Last Hero</b>","sys");
  G.won=true;
  document.getElementById("s-phase").textContent="VICTORY!";
}

function cmdHelp(){
  title("📋 AVAILABLE COMMANDS");
  const cmds=[
    ["go [north/south/east/west]","Move between zones and locations"],
    ["look","See description of the current zone"],
    ["explore","Search for hidden items in the zone"],
    ["take [item]","Pick up an item from the floor"],
    ["use [item]","Use an item from your inventory"],
    ["examine [item]","See details about an item"],
    ["attack","Attack the enemy in this zone"],
    ["inventory","Show your full inventory"],
    ["help","Show this command list"],
  ];
  cmds.forEach(([c,d])=>pr(`<span style="color:var(--gold)">● ${c}</span> <span style="color:var(--dim)">→ ${d}</span>`));
  pr(`<span style="color:var(--gold)">MISSION: Get Cap's Shield and defeat Thanos.</span>`,"sys");
}

// ── Parse and execute command ──────────────────────────────────────────────
function execute(raw){
  if(G.dead && !raw.toLowerCase().includes("help")){
    pr("You've been defeated. Reload the page to try again.","err"); return;
  }
  const cmd=raw.trim().toLowerCase();
  if(!cmd) return;
  pr(`> ${raw}`,"echo");

  const w=cmd.split(/\s+/);
  const v=w[0], rest=w.slice(1).join(" ");
  const DIRS=["north","south","east","west","n","s","e","w"];
  const dirMap={n:"north",s:"south",e:"east",w:"west"};

  if(["look","l","examine room","observe","check"].includes(cmd)){
    describe();
  } else if(["inventory","inv","i","bag","backpack"].includes(cmd)){
    cmdInventory();
  } else if(["help","h","?","commands"].includes(cmd)){
    cmdHelp();
  } else if(v==="go"||v==="move"||v==="walk"||DIRS.includes(v)){
    let d=DIRS.includes(v)?v:rest;
    d=dirMap[d]||d;
    cmdGo(d);
  } else if(["take","pick","grab","get","collect"].includes(v)){
    cmdTake(rest);
  } else if(["use","drink","equip","activate"].includes(v)){
    cmdUse(rest);
  } else if(["examine","inspect","read","study"].includes(v)){
    cmdExamine(rest);
  } else if(["explore","search","scan","investigate"].includes(v)){
    cmdExplore();
  } else if(["attack","fight","hit","battle","strike","combat"].includes(v)){
    cmdAttack();
  } else {
    pr(RAND[Math.floor(Math.random()*RAND.length)],"err");
  }
  updatePanel();
}

// ── Input listener ─────────────────────────────────────────────────────────
document.getElementById("ci").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const v=e.target.value.trim();
    e.target.value="";
    if(v) execute(v);
  }
});

  pr(`You are <span style="color:var(--gold)">NICK FURY</span>, director of S.H.I.E.L.D. The only one who can stop him.`,"sys");
  pr("Your mission: find <b>Captain America's Shield</b> and defeat Thanos at the Final Battlefield.","sys");
  sep();
  pr("Type <span style='color:var(--gold)'>help</span> to see all available commands.");
  describe();
  updatePanel();
}
init();
</script>
